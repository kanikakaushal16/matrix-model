<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technology Adoption Dashboard | Research Model</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Model Column Colors */
            --bg-unexposed: #FFF9C4;
            --bg-novice: #FFF3E0;
            --bg-rote: #FCE4EC;
            --bg-fluent: #F3E5F5;
            --bg-competent: #FFF8E1;

            --div-yellow: #FFD54F;
            --div-orange: #FFB74D;
            --div-red: #F06292;
            --div-purple: #BA68C8;

            --female-pink: #e91e63;
            --male-blue: #2196f3;
            --match-bg: #fee2e2; 
            --match-border: #ef4444;
            --selected-blue: #E3F2FD;
            --selected-border: #2196F3;
            --error-red: #ef4444;
            --success-green: #22c55e;
        }

        body { font-family: 'Inter', sans-serif; background-color: #fcfcfc; margin: 0; padding: 40px 0; color: #111; }
        body.no-scroll { overflow: hidden; }
        
        .container { max-width: 1650px; margin: 0 auto; padding: 0 20px; }

        /* HEADER */
        .page-header { text-align: center; margin-bottom: 50px; }
        .page-header h1 { 
            font-family: 'Times New Roman', Times, serif; 
            font-size: 42px; font-weight: 700; margin: 0 0 10px 0; color: #000;
        }
        .page-header p { font-size: 18px; color: #777; margin: 0; font-weight: 400; }

        /* FILTERS */
        .dashboard-card {
            background: white; padding: 25px 30px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.04);
            margin-bottom: 15px; border: 1px solid #f0f0f0; display: flex; gap: 30px; align-items: flex-end;
        }
        .filter-group { display: flex; flex-direction: column; gap: 8px; }
        .filter-group label { font-size: 13px; font-weight: 700; }
        select { padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 14px; min-width: 160px; background: #fff; cursor: pointer; }
        .view-toggle { background: #000; color: #fff; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 14px; border: none; }

        /* STATS */
        .stats-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .stat-card { background: white; border-radius: 12px; padding: 30px 40px; flex: 1; box-shadow: 0 2px 12px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; }
        .stat-card h4 { margin: 0 0 12px 0; font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 700; }
        .stat-card .value { font-size: 52px; font-weight: 800; color: #000; }
        .gender-split { display: flex; gap: 40px; align-items: center; }
        .gender-item { display: flex; align-items: center; gap: 12px; font-weight: 800; font-size: 28px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; }
        .dot-f { background: var(--female-pink); }
        .dot-m { background: var(--male-blue); }
        .gender-label { color: #888; font-weight: 400; font-size: 18px; }

        /* SEARCH AREA */
        .search-area { background: white; padding: 20px 30px; border-radius: 12px; border: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        #participantSearch { padding: 12px 16px; border: 2px solid #ddd; border-radius: 8px; width: 280px; font-size: 14px; outline: none; transition: border-color 0.2s; }
        #participantSearch.valid { border-color: var(--success-green); }
        #participantSearch.invalid { border-color: var(--error-red); }
        .btn-reset { margin-left: auto; background: #6366f1; color: white; padding: 12px 28px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(99, 102, 241, 0.2); }
        .btn-reset:hover { background: #4f46e5; transform: translateY(-1px); }

        /* MATRIX TABLE */
        .matrix-container { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 30px rgba(0,0,0,0.06); overflow-x: auto; position: relative; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: 1750px; table-layout: fixed; border: 1px solid #ccc; }
        th, td { border-right: 1px solid #ccc; border-bottom: 1px solid #ccc; position: relative; }
        
        thead th { 
            position: sticky; top: 0; z-index: 20; background: #fafafa;
            font-family: 'Crimson Text', serif; font-weight: 700; font-size: 16px; padding: 15px 5px; 
            vertical-align: middle; 
        }

        tbody td { vertical-align: top; padding: 10px 5px; }

        /* STICKY COLUMN LOGIC */
        thead th:nth-child(1), tbody td:nth-child(1) { 
            position: sticky; left: 0; z-index: 150; background: #fafafa; 
            width: 320px; min-width: 320px; max-width: 320px;
            border-right: 2px solid #bbb; 
        }
        tbody td:nth-child(1) { background: #fff; padding: 20px 15px; }
        thead th:nth-child(1) { z-index: 200; }

        .usage-cell-text { font-family: 'Inter', sans-serif; font-size: 13px; line-height: 1.4; color: #555; font-weight: 400; margin-top: 8px; }
        
        .divider-inner { 
            writing-mode: vertical-rl; transform: rotate(180deg); font-family: 'Crimson Text', serif; font-weight: 700; font-size: 14px; text-align: center; height: 200px; padding: 5px; box-sizing: border-box; display: flex; align-items: center; justify-content: center; width: 100%; white-space: normal;
        }

        /* HOVER EFFECTS ON USERS */
        .p-badge { background: white; border: 1px solid #aaa; padding: 2px 8px; border-radius: 4px; font-weight: 700; font-size: 12px; cursor: pointer; transition: 0.15s; position: relative; }
        .p-badge:hover { background-color: var(--selected-blue) !important; border-color: var(--selected-border) !important; color: #1e40af; }
        .p-badge:hover::after {
            content: "click to view details"; font-family: 'Inter', sans-serif; font-style: italic; font-weight: 400; font-size: 10px;
            position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); color: white; padding: 4px 8px; border-radius: 4px; white-space: nowrap; pointer-events: none; z-index: 100;
        }
        .p-badge.matched { background-color: var(--match-bg) !important; border-color: var(--match-border) !important; transform: scale(1.15); z-index: 10; }
        .p-badge.selected-active { background-color: var(--selected-blue) !important; border-color: var(--selected-border) !important; }

        /* MODAL / PROFILE CARD */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); display: none; justify-content: center; align-items: center; z-index: 2000; backdrop-filter: blur(8px); }
        .modal-card { background: white; width: 85%; max-width: 720px; border-radius: 32px; padding: 40px; position: relative; max-height: 90vh; overflow-y: auto; box-shadow: 0 25px 60px rgba(0,0,0,0.15); border: 1px solid #eee; }
        .modal-close { position: absolute; top: 25px; right: 25px; background: #f3f4f6; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; color: #666; transition: 0.2s; }
        .modal-close:hover { background: #ef4444; color: white; }

        /* PROFILE CONTENT STYLING */
        .profile-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .info-item { background: #fcfcfc; border: 1px solid #f0f0f0; padding: 20px; border-radius: 20px; }
        .info-label { font-size: 11px; font-weight: 800; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
        .info-value { font-size: 20px; font-weight: 700; color: #111; }
        
        .journey-section { margin-top: 40px; }
        .journey-row { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid #f5f5f5; }
        .journey-label { font-size: 11px; font-weight: 800; color: #9ca3af; text-transform: uppercase; letter-spacing: 1px; margin: 0 0 4px 0; }
        .journey-status { font-size: 18px; font-weight: 700; color: #111; margin: 0; }
        
        /* SPECIFIC PILL STYLES */
        .pill { font-size: 11px; font-weight: 800; padding: 6px 14px; border-radius: 8px; text-transform: uppercase; }
        .pill-unexposed { background: var(--bg-unexposed); color: #856404; }
        .pill-novice { background: var(--bg-novice); color: #854d0e; }
        .pill-rote-learnt { background: var(--bg-rote); color: #9d174d; }
        .pill-fluent { background: var(--bg-fluent); color: #6b21a8; }
        .pill-competent { background: var(--bg-competent); color: #706500; }

        /* MINIMIZED STATE */
        .minimized td { height: 100px !important; vertical-align: middle !important; padding: 5px !important; }
        .minimized td:nth-child(1) { text-align: left !important; padding: 10px !important; }
        .minimized .usage-cell-text { display: none; }
        .minimized .badge-list { display: none !important; }
        .minimized .divider-inner { height: 100px !important; font-size: 15px; padding: 2px; overflow: visible; line-height: 0.95; word-break: normal; white-space: normal; }
        .minimized .usage-box-container { height: 100%; display: flex; flex-direction: column; justify-content: center !important; align-items: center !important; padding-top: 0 !important; }

        #connectionCanvas { position: absolute; top: 0; left: 0; pointer-events: none; z-index: 100; }
    </style>
</head>
<body>

<div class="container">
    <div class="page-header">
        <h1>Technology Adoption by Emergent Users</h1>
        <p>An interactive positioning model mapping digital literacy and barriers to adoption.</p>
    </div>

    <div class="dashboard-card">
        <div class="filter-group"><label>Age Group</label><select id="ageF"><option value="all">All</option><option value="35-45">35–45</option><option value="46-60">46–60</option></select></div>
        <div class="filter-group"><label>Education</label><select id="eduF"><option value="all">All</option><option value="Illiterate">Illiterate</option><option value="4th">Till 4th</option><option value="10th">Till 10th</option></select></div>
        <div class="filter-group"><label>Gender</label><select id="genF"><option value="all">All</option><option value="Male">Male</option><option value="Female">Female</option></select></div>
        <div class="filter-group"><label>Type of Phone</label><select id="phoneF"><option value="all">All</option><option value="Smartphone">Smartphone</option><option value="Feature Phone">Feature Phone</option></select></div>
        <button class="btn-reset" onclick="resetFilters()">Reset All Filters</button>
    </div>

    <div class="stats-row">
        <div class="stat-card"><h4>TOTAL PARTICIPANTS</h4><div class="value" id="totalCount">31</div></div>
        <div class="stat-card"><h4>GENDER SPLIT</h4><div class="gender-split"><div class="gender-item"><span class="dot dot-f"></span> <span id="femaleCount">18</span> <span class="gender-label">Female</span></div><div class="gender-item"><span class="dot dot-m"></span> <span id="maleCount">13</span> <span class="gender-label">Male</span></div></div></div>
    </div>

    <div class="search-area">
        <div style="display:flex; align-items:center; gap:15px;"><label style="font-weight:700">Find Participant:</label><input type="text" id="participantSearch" placeholder="e.g. T01"></div>
        <button class="view-toggle" id="toggleBtn">Minimise Users</button>
    </div>

    <div class="matrix-container" id="matrixContainer">
        <canvas id="connectionCanvas"></canvas>
        <table id="matrixTable">
            <thead>
                <tr>
                    <th style="text-align: center;">ACTIVITY & USAGE</th><th>Unexposed usage</th><th style="width:70px;"></th><th>Novice usage</th><th style="width:110px;"></th><th>Rote learnt usage</th><th style="width:70px;"></th><th>Fluent Usage</th><th style="width:70px;"></th><th>Competent Usage</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal()">
    <div class="modal-card" onclick="event.stopPropagation()"><button class="modal-close" onclick="closeModal()">✕</button><div id="modalContent"></div></div>
</div>

    const matrixData = [

    let activeSearchID = null;

    const canvas = document.getElementById('connectionCanvas');
    const ctx = canvas.getContext('2d');

    function renderTable() {
        const body = document.getElementById('tableBody'); body.innerHTML = "";
        matrixData.forEach(row => {

            tr.innerHTML = `

                <td style="background:var(--bg-fluent)">${genCell(row.st.fl)}</td>
                <td style="background:var(--div-purple)"><div class="divider-inner">${row.divs[3].replace(/\//g, '/<br/>')}</div></td>
                <td style="background:var(--bg-competent)">${genCell(row.st.co)}</td>
            `;
            body.appendChild(tr);
        });
        applyFilter();
    }

    function genCell(obj) {
        const badges = obj.u.map(id => `<span class="p-badge" data-id="${id}" onclick="handleBadgeClick('${id}')">${id}</span>`).join('');
        return `<div class="usage-box-container" style="padding:15px; min-height:200px; display:flex; flex-direction:column; justify-content:flex-start; align-items:center; text-align:center;"><div style="font-family:'Crimson Text'; font-weight:700; margin-bottom:12px; font-size:14px; padding-top:10px;">${obj.t}</div><div class="badge-list" style="display:flex; flex-wrap:wrap; gap:6px; justify-content:center;">${badges}</div></div>`;
    }

    function handleBadgeClick(id) {
        manualSelectedID = id;
        applyFilter();
        openDetailCard(id);
    }

    function openDetailCard(id) {
        const p = participants.find(x => x.participant_code === id);
        if(!p) return;
        document.body.classList.add('no-scroll'); 
        
        let journeyHtml = "";
        matrixData.forEach(row => {
            let status = "Not Mapped", stage = "Unexposed";
            for (let [k, v] of Object.entries(row.st)) { 
                if (v.u.includes(id)) { status = v.t; stage = v.stage; break; } 
            }
            journeyHtml += `
                <div class="journey-row">
                    <div>
                        <p class="journey-label">${row.act}</p>
                        <p class="journey-status">${status}</p>
                    </div>
                    <span class="pill pill-${stage.toLowerCase().replace(/\s+/g, '-')}">${stage}</span>
                </div>`;
        });

        document.getElementById('modalContent').innerHTML = `
            <div style="display:flex; align-items:center; gap:20px; margin-bottom:15px;">
                <div style="width:65px; height:65px; border-radius:50%; background:#6366f1; color:white; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:24px;">${p.participant_code}</div>
                <div>
                    <h2 style="margin:0; font-size:32px; font-weight:800;">Participant ${p.participant_code}</h2>
                    <p style="margin:0; color:#9ca3af; font-size:14px; font-style:italic;">Emergent Technology User</p>
                </div>
            </div>

            <div class="profile-info-grid">
                <div class="info-item">
                    <div class="info-label">📅 AGE</div>
                    <div class="info-value">${p.age} years</div>
                </div>
                <div class="info-item">
                    <div class="info-label">👤 GENDER</div>
                    <div class="info-value">${p.gender}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">🎓 EDUCATION</div>
                    <div class="info-value">${p.education}</div>
                </div>
                <div class="info-item">
                    <div class="info-label">📱 PHONE TYPE</div>
                    <div class="info-value">${p.phone}</div>
                </div>
            </div>

            <div class="journey-section">
                <h3 style="font-size:20px; font-weight:800; margin-bottom:10px;">Technology Adoption Journey</h3>
                <div style="border-top: 1px solid #f0f0f0;">${journeyHtml}</div>
            </div>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() { 
        document.getElementById('modalOverlay').style.display = 'none'; 
        document.body.classList.remove('no-scroll'); 
        manualSelectedID = null;
        applyFilter();
    }

    function applyFilter() {
        const filtered = participants.filter(p => {
            const ageVal = document.getElementById('ageF').value;
            const eduVal = document.getElementById('eduF').value;
            const genVal = document.getElementById('genF').value;
            const phoneVal = document.getElementById('phoneF').value;
            const aMatch = ageVal === 'all' || (ageVal === '35-45' ? (p.age >= 35 && p.age <= 45) : (p.age >= 46 && p.age <= 60));
            const eMatch = eduVal === 'all' || p.education.includes(eduVal);
            const gMatch = genVal === 'all' || p.gender === genVal;
            const pMatch = phoneVal === 'all' || p.phone.toLowerCase().includes(phoneVal.toLowerCase());
            return aMatch && eMatch && gMatch && pMatch;
        });
        document.getElementById('totalCount').innerText = filtered.length;
        document.getElementById('femaleCount').innerText = filtered.filter(p => p.gender === 'Female').length;
        document.getElementById('maleCount').innerText = filtered.filter(p => p.gender === 'Male').length;
        const activeIds = filtered.map(p => p.participant_code);
        document.querySelectorAll('.p-badge').forEach(el => {
            const id = el.dataset.id; el.style.display = activeIds.includes(id) ? 'inline-block' : 'none';
            el.classList.toggle('matched', activeSearchID === id); el.classList.toggle('selected-active', manualSelectedID === id);
        });
        setTimeout(drawJourneyLine, 50);
    }

    function drawJourneyLine() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (!activeSearchID) return;
        const table = document.getElementById('matrixTable'); const container = document.getElementById('matrixContainer');
        canvas.width = table.offsetWidth; canvas.height = table.offsetHeight;
        const matches = document.querySelectorAll(`.p-badge[data-id="${activeSearchID}"]:not([style*="display: none"])`);
        const pts = [];
        matches.forEach(badge => { const r = badge.getBoundingClientRect(); const cr = container.getBoundingClientRect(); pts.push({ x: (r.left - cr.left) + (r.width/2) + container.scrollLeft, y: (r.top - cr.top) + (r.height/2) }); });
        if (pts.length < 2) return;
        ctx.beginPath(); ctx.strokeStyle = '#ef4444'; ctx.lineWidth = 4; ctx.moveTo(pts[0].x, pts[0].y);
        for(let i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
        ctx.stroke();
        pts.forEach(p => { ctx.fillStyle='#ef4444'; ctx.beginPath(); ctx.arc(p.x, p.y, 8, 0, Math.PI*2); ctx.fill(); ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); });
    }

    document.getElementById('participantSearch').addEventListener('input', (e) => {
        let v = e.target.value.toUpperCase(); e.target.value = v;
        const exists = participants.some(p => p.participant_code === v);
        e.target.className = !v ? '' : (exists ? 'valid' : 'invalid');
        activeSearchID = exists ? v : null;
        applyFilter();
    });

    function resetFilters() { 
        activeSearchID = manualSelectedID = null; document.getElementById('participantSearch').value = ''; 
        document.getElementById('participantSearch').className = '';
        document.querySelectorAll('select').forEach(s => s.value = 'all'); applyFilter(); 
    }

    document.getElementById('toggleBtn').onclick = function() {
        document.getElementById('matrixTable').classList.toggle('minimized');
        this.innerText = this.innerText.includes('Minimise') ? 'Show Users' : 'Minimise Users';
        setTimeout(drawJourneyLine, 300);
    };

    document.querySelectorAll('select').forEach(s => s.onchange = applyFilter);
    window.onload = renderTable;
</script>
</body>
</html>
